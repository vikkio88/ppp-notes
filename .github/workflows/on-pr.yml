name: On Pull Request
on:
  pull_request:
    branches:
      - main
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 23
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun check:data
