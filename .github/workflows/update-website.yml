name: Update Website

on: workflow_dispatch

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build and deploy
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: bun run update:website:ci

      - name: Commit new files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet && exit 0
          git checkout -b data-update/${{ github.run_id }}
          git add .
          git commit -m "chore: update data files [skip ci]"
          git push origin data-update/${{ github.run_id }}
          gh pr create \
            --title "chore: update episodes data files" \
            --body "Automated episodes data update — $(date -u '+%Y-%m-%d %H:%M:%S UTC')" \
            --base main \
            --head data-update/${{ github.run_id }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
